        .btn-dl { background: #28a745; color: #fff; padding: 15px 30px; border-radius: 10px; text-decoration: none; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ad-slot"> <script type="text/javascript">

        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/9f083686346ab9e9da811d0306e36583/invoke.js"></script>
    </div>

    <div class="timer-box">
        <h3>Generating Link...</h3>
        <div id="timer">15</div>
        <a href="#" id="final-btn" class="btn-dl">📥 CLICK TO DOWNLOAD</a>
    </div>

    <div class="ad-slot"> <script type="text/javascript">

    <div class="ad-slot"> </div>

    <script>
        let timeLeft = 15;
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');

        let downloadTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(downloadTimer);
                document.getElementById('timer').style.display = 'none';
                let btn = document.getElementById('final-btn');
                btn.style.display = 'inline-block';
                btn.href = "https://drive.google.com/uc?export=download&id=" + fileId;
            }
        }, 1000);
    </script>
</body>
