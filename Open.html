<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MekoAI — Your AI Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-primary: #0d0d0d;
    --bg-secondary: #171717;
    --bg-tertiary: #212121;
    --bg-hover: #2a2a2a;
    --bg-chat: #0d0d0d;
    --text-primary: #ececec;
    --text-secondary: #9b9b9b;
    --text-muted: #666;
    --accent: #10a37f;
    --accent-hover: #0e8c6b;
    --border: #2e2e2e;
    --user-bubble: #2e2e2e;
    --ai-bubble: transparent;
    --scrollbar: #2a2a2a;
    --scrollbar-hover: #444;
    --sidebar-width: 280px;
    --danger: #ef4444;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 100;
    flex-shrink: 0;
  }

  .sidebar.hidden {
    transform: translateX(-100%);
    position: absolute;
    height: 100%;
    opacity: 0;
    pointer-events: none;
  }

  .sidebar-header {
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: white;
  }

  .new-chat-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .new-chat-btn:hover { background: var(--bg-hover); }

  .sidebar-search {
    padding: 12px;
  }

  .sidebar-search input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-muted); }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  .chat-list-label {
    padding: 8px 12px 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chat-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
  }
  .chat-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .chat-item.active { background: var(--bg-tertiary); color: var(--text-primary); }

  .chat-item-title {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .chat-item-delete {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .chat-item:hover .chat-item-delete { display: block; }
  .chat-item-delete:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sidebar-footer-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .sidebar-footer-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .user-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: white;
  }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-primary);
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toggle-sidebar-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    font-size: 18px;
  }
  .toggle-sidebar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .model-selector:hover { border-color: var(--accent); }

  .model-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    min-width: 220px;
    display: none;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .model-dropdown.show { display: block; }

  .model-option {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .model-option:hover { background: var(--bg-hover); }
  .model-option.active { background: var(--bg-hover); }
  .model-option-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .model-option-desc { font-size: 11px; color: var(--text-muted); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }

  .header-btn.share { background: var(--accent); color: white; border-color: var(--accent); }
  .header-btn.share:hover { background: var(--accent-hover); }

  /* ===== CHAT AREA ===== */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }

  .chat-messages {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
  }

  /* Welcome */
  .welcome-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 24px;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
  }

  .welcome-logo {
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    box-shadow: 0 4px 20px rgba(16,163,127,0.3);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .welcome-title { font-size: 26px; font-weight: 600; }
  .welcome-sub { font-size: 14px; color: var(--text-secondary); text-align: center; max-width: 500px; line-height: 1.6; }

  .suggestions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 600px;
    margin-top: 8px;
  }

  .suggestion {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
    color: var(--text-primary);
  }
  .suggestion:hover { border-color: var(--accent); background: var(--bg-tertiary); transform: translateY(-1px); }
  .suggestion-icon { font-size: 18px; margin-bottom: 6px; }
  .suggestion-text { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

  /* Messages */
  .message {
    padding: 18px 0;
    display: flex;
    gap: 16px;
    animation: fadeIn 0.3s ease;
  }
  .message + .message { border-top: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.user {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
  }
  .msg-avatar.ai {
    background: var(--accent);
    color: white;
  }

  .msg-content {
    flex: 1;
    min-width: 0;
  }

  .msg-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .msg-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-primary);
    word-wrap: break-word;
  }

  .msg-text p { margin-bottom: 10px; }
  .msg-text p:last-child { margin-bottom: 0; }

  .msg-text code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .msg-text pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }
  .msg-text pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg-actions {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .message:hover .msg-actions { opacity: 1; }

  .msg-action-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: inherit;
  }
  .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.4s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    padding: 0 24px 20px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }

  .input-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-container:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(16,163,127,0.15);
  }

  .input-top {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 12px;
  }

  #messageInput {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 200px;
    min-height: 24px;
    line-height: 1.5;
  }
  #messageInput::placeholder { color: var(--text-muted); }

  .input-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px 4px 8px;
  }

  .input-tools {
    display: flex;
    gap: 2px;
  }

  .tool-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
  }
  .tool-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .send-btn {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
  .send-btn:disabled { background: var(--bg-tertiary); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .input-footer {
    text-align: center;
    padding: 8px 0 0;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 480px;
    width: 90%;
    animation: scaleIn 0.2s ease;
  }

  @keyframes scaleIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal h2 { font-size: 18px; margin-bottom: 16px; }

  .settings-group { margin-bottom: 20px; }
  .settings-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

  .settings-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-option:last-child { border: none; }
  .settings-option span { font-size: 13px; color: var(--text-primary); }

  .toggle-switch {
    width: 40px; height: 22px;
    background: var(--bg-hover);
    border-radius: 11px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
  }
  .toggle-switch.active { background: var(--accent); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .toggle-switch.active::after { transform: translateX(18px); }

  .modal-close {
    width: 100%;
    padding: 10px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .modal-close:hover { background: var(--bg-hover); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .sidebar {
      position: absolute;
      height: 100%;
      z-index: 200;
    }
    .sidebar.hidden { transform: translateX(-100%); }
    .suggestions { grid-template-columns: 1fr; }
    .input-area { padding: 0 12px 12px; }
    .chat-messages { padding: 16px; }
    .main-header { padding: 12px 16px; }
    .header-btn span { display: none; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">M</div>
      <span>MekoAI</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      New
    </button>
  </div>

  <div class="sidebar-search">
    <input type="text" placeholder="Search chats..." id="searchInput" oninput="filterChats()">
  </div>

  <div class="chat-list" id="chatList">
    <div class="chat-list-label">Today</div>
  </div>

  <div class="sidebar-footer">
    <button class="sidebar-footer-btn" onclick="openSettings()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Settings
    </button>
    <button class="sidebar-footer-btn">
      <div class="user-avatar">U</div>
      <span>User</span>
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- Header -->
  <div class="main-header">
    <div class="header-left">
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div style="position:relative">
        <button class="model-selector" id="modelSelector" onclick="toggleModelDropdown()">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          <span id="currentModel">MekoAI Pro</span>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown">
          <div class="model-option active" onclick="selectModel('MekoAI Pro', this)">
            <span class="model-option-name">⚡ MekoAI Pro</span>
            <span class="model-option-desc">Fastest responses, great for most tasks</span>
          </div>
          <div class="model-option" onclick="selectModel('MekoAI Ultra', this)">
            <span class="model-option-name">🧠 MekoAI Ultra</span>
            <span class="model-option-desc">Most capable, advanced reasoning</span>
          </div>
          <div class="model-option" onclick="selectModel('MekoAI Mini', this)">
            <span class="model-option-name">💚 MekoAI Mini</span>
            <span class="model-option-desc">Lightweight, quick everyday tasks</span>
          </div>
          <div class="model-option" onclick="selectModel('Mek
