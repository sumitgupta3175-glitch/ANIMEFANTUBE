<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFanTube - Home</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .header { color: #1e90ff; font-size: 28px; font-weight: 800; margin-bottom: 30px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: auto; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; text-decoration: none; color: #fff; transition: 0.3s; display: block; }
        .card:hover { border-color: #1e90ff; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-name { padding: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">ANIME<span style="color:#fff">FANTUBE</span></div>
    
    <div class="grid">
        <a href="watch.html" class="card">
            <img src="https://image.tmdb.org/t/p/w500/v5pTidB6vH8fQG0Xw7Y9O3e9v.jpg" alt="COTE">
            <div class="card-name">Classroom of the Elite (Hindi)</div>
        </a>
        
        <div class="card" style="opacity: 0.5;">
            <img src="https://via.placeholder.com/200x300?text=Upcoming" alt="Soon">
            <div class="card-name">More Series Soon...</div>
        </div>
    </div>
</body>
</html>
