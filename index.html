<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFanTube - Neon Home</title>
    <style>
        /* Neon Theme Design */
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        header { 
            background: #000; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 3px solid #ff00ff; 
            box-shadow: 0 0 15px #ff00ff;
        }
        
        header h1 { 
            margin: 0; 
            color: #ff00ff; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }
        
        .container { 
            padding: 30px 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: auto;
        }
        
        /* Neon Cards */
        .anime-card { 
            background: #111; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #00d2ff; /* Neon Blue Border */
            transition: 0.4s ease; 
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            box-shadow: 0 0 5px #00d2ff;
        }
        
        .anime-card:hover { 
            border-color: #ff00ff; /* Hover par Neon Pink */
            transform: scale(1.05); 
            box-shadow: 0 0 20px #ff00ff;
        }
        
        .anime-card img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block;
            filter: brightness(0.9);
        }
        
        .anime-info { 
            padding: 12px 8px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.8);
        }
        
        .anime-info h3 { 
            margin: 5px 0; 
            font-size: 14px; 
            color: #fff; 
            text-shadow: 0 0 5px #fff;
        }
        
        .anime-info p { 
            margin: 5px 0 0; 
            font-size: 11px; 
            color: #00d2ff; /* Neon Blue Text */
            font-weight: bold; 
            text-transform: uppercase;
            text-shadow: 0 0 5px #00d2ff;
        }

        footer { 
            text-align: center; 
            padding: 40px; 
            color: #ff00ff; 
            font-size: 12px; 
            text-shadow: 0 0 5px #ff00ff;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ANIME FANTUBE</h1>
    </header>

    <div class="container">
        
        <a href="classroom-of-the-elite-watch.html" class="anime-card">
            <img src="https://drive.google.com/thumbnail?id=1p_ZQONiLvGQ_c772XMHThcHx3ZTspmZc&sz=w1000" alt="Classroom of the Elite">
            <div class="anime-info">
                <h3>Classroom of the Elite</h3>
                <p>Season 1-3 | Hindi Sub</p>
            </div>
        </a>

        <a href="DR-STONE.watach.html" class="anime-card">
            <img src="https://drive.google.com/thumbnail?id=1lHwUC54qEv2FANAnBjQA4q8hIkoA_qON&sz=w1000" alt="Dr. STONE">
            <div class="anime-info">
                <h3>Dr. STONE</h3>
                <p>Season 1-5 | Hindi Sub</p>
            </div>
        </a>

    </div>

    <footer>
        © 2026 ANIME FANTUBE | NEON EDITION
    </footer>

</body>
</html>
