    <style>
        :root {
            --primary: #1e90ff;
            --bg: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 10px; 
            text-align: center;
        }

        .container { max-width: 500px; margin: auto; }

        /* Header Fix */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5px; 
            margin-bottom: 10px;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: 1px; }
        .logo span { color: #fff; }

        /* Ad Slots - Fixed Height to prevent jumping */
        .ad-slot-top { height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }

        /* --- VIDEO PLAYER: YouTube Style Fix --- */
        .video-box {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(30, 144, 255, 0.2);
            margin-bottom: 15px;
        }
        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* Episode Title & Info */
        .content-info { text-align: left; padding: 0 5px 10px 5px; }
        .ep-title { font-size: 20px; font-weight: 600; margin: 0; }
        .ep-meta { font-size: 12px; color: #888; margin-top: 5px; }

        /* Episode Grid - Improved Spacing */
        .ep-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin: 15px 0; 
        }
        .btn-ep { 
            background: var(--card-bg); 
            color: #fff; 
            border: 1px solid #333; 
            padding: 12px 0; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 12px;
            transition: 0.3s;
        }
        .btn-ep.active { 
            background: var(--primary); 
            color: #000; 
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
        }

        /* Action Buttons - Modern Stack */
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .action-btn { 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px; 
            border: none; 
            cursor: pointer; 
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-dl { background: linear-gradient(90deg, #28a745, #218838); }
        .btn-yt { background: #ff0000; }
        .btn-tg { background: #229ED9; }

        .ad-slot-mid { min-height: 250px; margin-top: 25px; border-radius: 15px; overflow: hidden; background: #111; }
    </style>
</head>
