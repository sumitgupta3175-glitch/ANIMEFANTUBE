<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFanTube - Home</title>
    <style>
        /* Dark Theme Design */
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #ff69b4; }
        header h1 { margin: 0; color: #ff69b4; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            max-width: 1200px;
            margin: auto;
        }
        
        /* Anime Card Design */
        .anime-card { 
            background: #111; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
            transition: 0.3s ease; 
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .anime-card:hover { 
            border-color: #ff69b4; 
            transform: translateY(-5px); 
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }
        
        .anime-card img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            display: block;
            background: #222; /* Image load hone tak dark background dikhega */
        }
        
        .anime-info { padding: 12px 8px; text-align: center; }
        .anime-info h3 { margin: 5px 0; font-size: 14px; color: #fff; line-height: 1.2; height: 34px; overflow: hidden; }
        .anime-info p { margin: 5px 0 0; font-size: 11px; color: #ff69b4; font-weight: bold; text-transform: uppercase; }

        footer { text-align: center; padding: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>AnimeFanTube</h1>
    </header>

    <div class="container">
        
        <a href="classroom-of-the-elite-watch.html" class="anime-card">
            <img src="https://lh3.googleusercontent.com/d/YOUR_ID" alt="Classroom of the Elite">
            
            <div class="anime-info">
                <h3>Classroom of the Elite</h3>
                <p>Season 1-3 | Hindi Sub</p>
            </div>
        </a>

        </div>

    <footer>
        © 2026 AnimeFanTube | Created with Passion
    </footer>

</body>
</html>
