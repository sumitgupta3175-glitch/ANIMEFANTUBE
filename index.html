<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFanTube - Home</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #1e90ff; }
        header h1 { margin: 0; color: #1e90ff; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .anime-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; text-decoration: none; color: #fff; display: block; cursor: pointer; }
        .anime-card:hover { transform: translateY(-5px); border-color: #1e90ff; }
        .poster-container { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #222; }
        .poster-container img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; text-align: center; }
        .info h3 { margin: 5px 0; font-size: 13px; }
        .meta { font-size: 10px; color: #1e90ff; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>AnimeFanTube</h1>
    </header>

        <div class="anime-card" onclick="window.open('https://omg10.com/4/10982181', '_blank'); window.location.href='classroom-of-the-elite-watch.html';">
            <div class="poster-container">
                <img src="https://m.media-amazon.com/images/M/MV5BMjhiMzgxZTctNDc1Ni00OTIxLTgwMTUtZTAzMDQyMzExYzFkXkEyXkFqcGdeQXVyMzgxODM4NjM@._V1_FMjpg_UX1000_.jpg" alt="COTE">
            </div>
            <div class="info">
                <div class="meta">S1-S4 AVAILABLE</div>
                <h3>Classroom of the Elite</h3>
            </div>
        </div>
    </div>

</body>
</html>
