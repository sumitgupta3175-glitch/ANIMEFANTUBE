<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Anime - AnimeFanTube</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        /* 1. Ads Styling */
        .ad-slot { min-height: 50px; margin: 10px auto; background: #0a0a0a; display: flex; justify-content: center; align-items: center; border-radius: 8px; overflow: hidden; }

        /* 2. Video Player Fixed */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #1e90ff; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 0 15px rgba(30,144,255,0.3); }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 3. Section Titles */
        .label { text-align: left; font-size: 13px; font-weight: bold; color: #1e90ff; margin: 15px 5px 5px; text-transform: uppercase; }

        /* 4. Horizontal Scroll Fix (For Seasons & EP) */
        .scroll-row { display: flex; overflow-x: auto; white-space: nowrap; padding: 10px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-row::-webkit-scrollbar { display: none; }

        /* Season Buttons */
        .btn-s { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 8px 22px; border-radius: 20px; margin-right: 8px; cursor: pointer; font-size: 12px; flex: 0 0 auto; transition: 0.3s; }
        .btn-s.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        /* Episode Buttons (EP 1, 2, 3 Style) */
        .btn-ep { background: #111; color: #fff; border: 1px solid #333; padding: 12px 28px; border-radius: 10px; font-weight: bold; margin-right: 10px; cursor: pointer; flex: 0 0 auto; transition: 0.3s; }
        .btn-ep.active { background: #1e90ff; color: #fff; border-color: #1e90ff; box-shadow: 0 0 10px rgba(30,144,255,0.4); }

        /* 5. Download Button */
        .btn-dl { background: linear-gradient(to right, #28a745, #1e7e34); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = { 'key' : '9f083686346ab9e9da811d0306e36583', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/9f083686346ab9e9da811d0306e36583/invoke.js"></script>
    </div>

    <div class="video-box">
        <iframe id="main-player" src="https://drive.google.com/file/d/15LUE5Al2covTuEkWSXcIHYF9QqVhH8Ne/preview" allowfullscreen></iframe>
    </div>

    <div class="ad-slot" style="min-height: 250px;">
        <script type="text/javascript">
            atOptions = { 'key' : '10ed9aeface00126e5e4a704af783e8c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/10ed9aeface00126e5e4a704af783e8c/invoke.js"></script>
    </div>

    <div class="label">Select Season</div>
    <div class="scroll-row">
        <button class="btn-s" onclick="changeSeason(1, this)">S1</button>
        <button class="btn-s" onclick="changeSeason(2, this)">S2</button>
        <button class="btn-s" onclick="changeSeason(3, this)">S3</button>
        <button class="btn-s active" onclick="changeSeason(4, this)">S4</button>
    </div>

    <div class="label" id="ep-label">Episodes (Season 4)</div>
    <div class="scroll-row" id="ep-list">
        <button class="btn-ep" onclick="play('1JGQZsEsnV3rCxol4scspTZkT7SS88n98', '1', this)">EP 1</button>
        <button class="btn-ep" onclick="play('19cNfNi9riQkpNi5vaJPHE0yg1dt6eeJi', '2', this)">EP 2</button>
        <button class="btn-ep" onclick="play('1xXfYn7hp-t9c0UPfGZTQaCAnfty10FR1', '3', this)">EP 3</button>
        <button class="btn-ep active" onclick="play('15LUE5Al2covTuEkWSXcIHYF9QqVhH8Ne', '4', this)">EP 4</button>
    </div>

    <div class="ad-slot"></div>

    <button id="dl-btn" class="btn-dl" onclick="startDL()">📥 DOWNLOAD EPISODE</button>

    <div class="ad-slot" style="margin-top:20px;"></div>
    <div class="ad-slot"></div>

    <script>
        var currentFile = "15LUE5Al2covTuEkWSXcIHYF9QqVhH8Ne";
        var step = 0;
        var mySmartLink = "https://www.profitablecpmratenetwork.com/jc4gx58sh?key=5514e279c1ee9115dc30d84909466443"; 

        function changeSeason(sNum, btn) {
            document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let list = document.getElementById('ep-list');
            document.getElementById('ep-label').innerText = "Episodes (Season " + sNum + ")";

            if(sNum === 4) {
                list.innerHTML = `
                    <button class="btn-ep" onclick="play('1JGQZsEsnV3rCxol4scspTZkT7SS88n98', '1', this)">EP 1</button>
                    <button class="btn-ep" onclick="play('19cNfNi9riQkpNi5vaJPHE0yg1dt6eeJi', '2', this)">EP 2</button>
                    <button class="btn-ep" onclick="play('1xXfYn7hp-t9c0UPfGZTQaCAnfty10FR1', '3', this)">EP 3</button>
                    <button class="btn-ep active" onclick="play('15LUE5Al2covTuEkWSXcIHYF9QqVhH8Ne', '4', this)">EP 4</button>
                `;
            } else {
                list.innerHTML = `<div style="padding:15px; color:#555; font-style:italic; font-size:13px;">Season ${sNum} episodes are coming soon...</div>`;
            }
        }

        function play(id, num, el) {
            document.getElementById('main-player').src = "https://drive.google.com/file/d/" + id + "/preview";
            document.querySelectorAll('.btn-ep').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentFile = id;
            step = 0;
            document.getElementById('dl-btn').innerText = "📥 DOWNLOAD EPISODE " + num;
        }

        function startDL() {
            if(step === 0) {
                window.open(mySmartLink, '_blank');
                step++;
                document.getElementById('dl-btn').innerText = "✅ CLICK AGAIN TO VERIFY";
                document.getElementById('dl-btn').style.background = "#007bff";
            } else {
                window.location.href = "download.html?id=" + currentFile;
            }
        }
    </script>
</body>
</html>
