<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom of the Elite - Watch Online</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .player-container { max-width: 800px; margin: auto; background: #000; border: 2px solid #e50914; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        
        /* Season Selection Buttons */
        .season-nav { margin: 20px 0; }
        .btn-s { background: #333; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-s.active { background: #e50914; }

        /* Episode Lists */
        .ep-list { display: none; margin: 20px auto; max-width: 800px; background: #1a1a1a; padding: 15px; border-radius: 10px; }
        .ep-list.active { display: block; }
        .btn-ep { background: #444; color: white; border: none; padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 3px; }
        .btn-ep:hover { background: #e50914; }
        .btn-ep.active { background: #e50914; font-weight: bold; }

        .dl-section { margin-top: 20px; }
        #dl-btn { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Classroom of the Elite</h2>

    <div class="player-container">
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="season-nav">
        <button class="btn-s active" id="btn-s1" onclick="showSeason(1)">Season 1</button>
        <button class="btn-s" id="btn-s2" onclick="showSeason(2)">Season 2</button>
        <button class="btn-s" id="btn-s3" onclick="showSeason(3)">Season 3</button>
        <button class="btn-s" id="btn-s4" onclick="showSeason(4)">Season 4</button>
    </div>

    <div id="s1" class="ep-list active">
        <h3>Season 1 Episodes</h3>
        <button class="btn-ep" onclick="playDrive('1UwCubKviH8Y1aowsDk1t_Nhma9mRFXJY', 1)">Ep 1</button>
        <button class="btn-ep" onclick="playDrive('S1_EP2_ID', 2)">Ep 2</button>
        </div>

    <div id="s2" class="ep-list">
        <h3>Season 2 Episodes</h3>
        <button class="btn-ep" onclick="playDrive('S2_EP1_ID', 1)">Ep 1</button>
        <button class="btn-ep" onclick="playDrive('S2_EP2_ID', 2)">Ep 2</button>
    </div>

    <div id="s3" class="ep-list">
        <h3>Season 3 Episodes</h3>
        <button class="btn-ep" onclick="playDrive('S3_EP1_ID', 1)">Ep 1</button>
    </div>

    <div id="s4" class="ep-list">
        <h3>Season 4 Episodes</h3>
        <button class="btn-ep" onclick="playDood('j1lu0r3vtv01', 5)">Ep 5 (S4)</button>
    </div>

    <div class="dl-section">
        <button id="dl-btn" onclick="startDL()">📥 Download Episode</button>
    </div>

    <script>
        var currentID = "1UwCubKviH8Y1aowsDk1t_Nhma9mRFXJY";
        var currentType = "drive";

        // Season tab switch karne ke liye
        function showSeason(num) {
            document.querySelectorAll('.ep-list').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.btn-s').forEach(el => el.classList.remove('active'));
            document.getElementById('s' + num).classList.add('active');
            document.getElementById('btn-s' + num).classList.add('active');
        }

        // Google Drive Player
        function playDrive(id, num) {
            currentID = id;
            currentType = "drive";
            document.getElementById('main-player').src = "https://drive.google.com/file/d/" + id + "/preview";
            document.getElementById('dl-btn').innerText = "📥 Download Episode " + num;
            
            // Highlight Episode Button
            document.querySelectorAll('.btn-ep').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        // DoodStream / MyVidPlay Player
        function playDood(id, num) {
            currentID = id;
            currentType = "dood";
            document.getElementById('main-player').src = "https://myvidplay.com/e/" + id;
            document.getElementById('dl-btn').innerText = "📥 Download Episode " + num;
            
            document.querySelectorAll('.btn-ep').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Download logic
        function startDL() {
            window.open('https://omg10.com/4/10982181', '_blank'); // Ad Link
            if(currentType === "drive") {
                window.location.href = "https://drive.google.com/uc?export=download&id=" + currentID;
            } else {
                window.location.href = "https://myvidplay.com/d/" + currentID;
            }
        }

        // Default Episode load
        window.onload = function() {
            playDrive('1UwCubKviH8Y1aowsDk1t_Nhma9mRFXJY', 1);
        };
    </script>

</body>
</html>
