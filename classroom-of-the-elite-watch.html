<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom of the Elite - All Seasons</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        .ad-slot { min-height: 50px; margin: 10px auto; background: #0a0a0a; display: flex; justify-content: center; align-items: center; border-radius: 8px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #ff69b4; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 0 15px rgba(255, 105, 180, 0.3); }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .label { text-align: left; font-size: 14px; font-weight: bold; color: #ff69b4; margin: 20px 5px 10px; text-transform: uppercase; border-left: 3px solid #ff69b4; padding-left: 8px; }
        .season-row { display: flex; overflow-x: auto; white-space: nowrap; padding: 10px 5px; gap: 10px; scrollbar-width: none; }
        .season-row::-webkit-scrollbar { display: none; }
        .btn-s { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 8px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .btn-s.active { background: #ff69b4; color: #fff; border-color: #ff69b4; font-weight: bold; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; padding: 5px; }
        .btn-ep { background: #111; color: #ff69b4; border: 1px solid #ff69b4; padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ep.active { background: #ff69b4; color: #fff; box-shadow: 0 0 12px rgba(255, 105, 180, 0.5); }
        .btn-dl { background: linear-gradient(to right, #ff1493, #ff69b4); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="video-box">
        <iframe id="main-player" src="https://drive.google.com/file/d/1mLI2Q7uNC23G1rilqnzmW2dz52pg_aVC/preview" allowfullscreen allow="autoplay"></iframe>
    </div>

    <div class="label">Select Season</div>
    <div class="season-row">
        <button class="btn-s active" onclick="changeSeason(1, this)">S1</button>
        <button class="btn-s" onclick="changeSeason(2, this)">S2</button>
        <button class="btn-s" onclick="changeSeason(3, this)">S3</button>
        <button class="btn-s" onclick="changeSeason(4, this)">S4</button>
    </div>

    <div class="label" id="ep-label">Episodes (Season 1)</div>
    <div class="ep-grid" id="ep-list">
        </div>

    <button id="dl-btn" class="btn-dl" onclick="startDL()">📥 DOWNLOAD EPISODE 1</button>

    <script>
        var currentFile = "1mLI2Q7uNC23G1rilqnzmW2dz52pg_aVC";
        var currentType = "drive"; 
        var step = 0;
        var mySmartLink = "https://www.profitablecpmratenetwork.com/jc4gx58sh?key=5514e279c1ee9115dc30d84909466443";

            document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

                    <button class="btn-ep" onclick="play('1tXne5olJsLqONQUP24otk4rZrR8T5J0i', '9', this, 'drive')">EP 9</button>
                    <button class="btn-ep" onclick="play('1EN6TSfugSv6-heJJ0nyqUJiNRbd7dqwl', '10', this, 'drive')">EP 10</button>
                    <button class="btn-ep" onclick="play('1-BaYW3EQbqzEUS3WtSIk9GPvrdJKMhpT', '11', this, 'drive')">EP 11</button>
                    <button class="btn-ep" onclick="play('11nurJGCkyRAt_FJutVi3y6J8VxTtgi5C', '12', this, 'drive')">EP 12</button>`;
                play('1mLI2Q7uNC23G1rilqnzmW2dz52pg_aVC', '1', null, 'drive');
            } else if(sNum === 2) {
                list.innerHTML = `

                    <button class="btn-ep" onclick="play('1soaLkGvoyMo4YNEBoqlujGx-21PnFc9A', '10', this, 'drive')">EP 10</button>
                    <button class="btn-ep" onclick="play('10F2QXfOWNK2tnZiZOgExUe3MfXbb_L7S', '11', this, 'drive')">EP 11</button>
                    <button class="btn-ep" onclick="play('1HQcD7kYNFh8pzs3LmBEOpykIdaD8VCgX', '12', this, 'drive')">EP 12</button>
                    <button class="btn-ep" onclick="play('1fm-zIXOHYzZJN-AwqKPI3UvTDLrNW7Sj', '13', this, 'drive')">EP 13</button>`;
                play('1Qj6JN7GSLuoYct4ovWPRxAo1269Bjr7F', '1', null, 'drive');

                list.innerHTML = `
                    <button class="btn-ep active" onclick="play('1US6jJ0OTkfEDLQgPP4UcbtJnu0mJdmP6', '1', this, 'drive')">EP 1</button>
                    <button class="btn-ep" onclick="play('1EASbEA4Cgr9ci61fZyIQmkZpK66ST2dO', '2', this, 'drive')">EP 2</button>

                    <button class="btn-ep" onclick="play('1PT877Uu-hUPNy9ZF9rnqJOV6T6IcSAH7', '4', this, 'drive')">EP 4</button>
                    <button class="btn-ep" onclick="play('1B1HL09ImQWI1YqgdDivJRlflEc1LqCKG', '5', this, 'drive')">EP 5</button>
                    <button class="btn-ep" onclick="play('1J0VIIhCE6zxYMGd23jpMw7gwpKqnpeMS', '6', this, 'drive')">EP 6</button>
                    <button class="btn-ep" onclick="play('196Z3ogkBTAd42ZmWq0TuoIe7QUzwKNwl', '7', this, 'drive')">EP 7</button>
                    <button class="btn-ep" onclick="play('1NckDO2dEbOUE2NggyZUcpjqgjqLxDSps', '8', this, 'drive')">EP 8</button>
                    <button class="btn-ep" onclick="play('1nBGNW6AQzPCO_OMoBAIYjGCIn5ewCvFb', '9', this, 'drive')">EP 9</button>

                    <button class="btn-ep" onclick="play('1YgtWvkY2NbivG84wnpga_LT87xvngb5_', '11', this, 'drive')">EP 11</button>
                    <button class="btn-ep" onclick="play('1ps4Vp8tQy55lb4OgWnUuvsYTEwRHr5po', '12', this, 'drive')">EP 12</button>
                    <button class="btn-ep" onclick="play('1etKY6GNC0ZmqXedsT7bO4YWRs8u5snkv', '13', this, 'drive')">EP 13</button>`;
                play('1US6jJ0OTkfEDLQgPP4UcbtJnu0mJdmP6', '1', null, 'drive');
            } else if(sNum === 4) {
                list.innerHTML = `
                    <button class="btn-ep active" onclick="play('1JGQZsEsnV3rCxol4scspTZkT7SS88n98', '1', this, 'drive')">EP 1</button>

                    <button class="btn-ep" onclick="play('1xXfYn7hp-t9c0UPfGZTQaCAnfty10FR1', '3', this, 'drive')">EP 3</button>
                    <button class="btn-ep" onclick="play('15LUE5Al2covTuEkWSXcIHYF9QqVhH8Ne', '4', this, 'drive')">EP 4</button>
                    <button class="btn-ep" onclick="play('j1lu0r3vtv01', '5', this, 'dood')">EP 5</button>`;
                play('1JGQZsEsnV3rCxol4scspTZkT7SS88n98', '1', null, 'drive');
            }
        }

        function play(id, num, el, type) {
            currentType = type || "drive"; 
            let player = document.getElementById('main-player');
            
            if(currentType === "dood") {
                player.src = "https://myvidplay.com/e/" + id;
            } else {
                player.src = "https://drive.google.com/file/d/" + id + "/preview";
            }

            document.querySelectorAll('.btn-ep').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            
            currentFile = id;
            step = 0; 
            document.getElementById('dl-btn').innerText = "📥 DOWNLOAD EPISODE " + num;
        }

        function startDL() {
            if(step === 0) {
                window.open(mySmartLink, '_blank');
                step++;
                document.getElementById('dl-btn').innerText = "✅ CLICK AGAIN TO VERIFY";
            } else {
                if(currentType === "drive") {
                    window.location.href = "download.html?id=" + currentFile;
                } else {
                    window.location.href = "https://myvidplay.com/d/" + currentFile;
                }
            }
        }

        // Initialize Season 1 on load
        window.onload = function() {
            changeSeason(1, document.querySelector('.btn-s'));
        };
    </script>
</body>
</html>
