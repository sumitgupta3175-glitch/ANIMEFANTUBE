<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom of the Elite - Watch Online</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .player-container { max-width: 900px; margin: auto; background: #000; border: 2px solid #333; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; background: #000; }
        .ep-box { max-width: 900px; margin: 20px auto; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; }
        h2 { color: #e50914; margin-bottom: 10px; }
        h3 { color: #888; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; font-size: 16px; text-transform: uppercase; }
        .btn-ep { background: #333; color: white; border: none; padding: 10px 18px; margin: 5px; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 14px; min-width: 60px; }
        .btn-ep:hover { background: #e50914; transform: translateY(-2px); }
        .btn-ep.active { background: #e50914; font-weight: bold; box-shadow: 0 0 10px rgba(229, 9, 20, 0.6); }
        .dl-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        #dl-btn { background: #28a745; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        #dl-btn:hover { background: #218838; transform: scale(1.05); }
    </style>
</head>
<body>

    <h2>Classroom of the Elite</h2>

    <div class="player-container">
        <iframe id="main-player" src="" allow="autoplay" allowfullscreen></iframe>
    </div>

    <div class="ep-box">
        
        <h3>Seasons 1-3 (Server 1)</h3>
        <div id="drive-list">
            <button class="btn-ep" onclick="playVideo('1UwCubKviH8Y1aowsDk1t_Nhma9mRFXJY', 1, 'drive', this)">EP 1</button>
            <button class="btn-ep" onclick="playVideo('DRIVE_ID_2', 2, 'drive', this)">EP 2</button>
            <button class="btn-ep" onclick="playVideo('DRIVE_ID_3', 3, 'drive', this)">EP 3</button>
        </div>

        <h3>Season 4 (Server 2)</h3>
        <div id="dood-list">
            <button class="btn-ep" onclick="playVideo('j1lu0r3vtv01', 5, 'dood', this)">EP 5 (S4)</button>
        </div>

    </div>

    <div class="dl-section">
        <button id="dl-btn" onclick="startDL()">📥 Download Episode</button>
    </div>

    <script>
        // Global variables to store current video info
        var currentID = ""; 
        var currentType = "";

        /**
         * playVideo: Unified function to handle both Drive and DoodStream
         * @param {string} id - The video/file ID
         * @param {number} num - Episode number for display
         * @param {string} type - 'drive' or 'dood'
         * @param {object} element - The button clicked
         */
        function playVideo(id, num, type, element) {
            currentID = id;
            currentType = type;
            let player = document.getElementById('main-player');
            let dlBtn = document.getElementById('dl-btn');

            // 1. Set Player Source
            if (type === 'drive') {
                player.src = "https://drive.google.com/file/d/" + id + "/preview";
            } else if (type === 'dood') {
                player.src = "https://myvidplay.com/e/" + id;
            }

            // 2. Update UI (Active Class)
            document.querySelectorAll('.btn-ep').forEach(btn => btn.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            }

            // 3. Update Download Button Text
            dlBtn.innerText = "📥 Download Episode " + num;
        }

        /**
         * startDL: Handles ads and directs to the correct download link
         */
        function startDL() {
            if (!currentID) {
                alert("Please select an episode first!");
                return;
            }

            // Ad link (omg10)
            window.open('https://omg10.com/4/10982181', '_blank');

            // Download Logic
            setTimeout(() => {
                if (currentType === "drive") {
                    window.location.href = "https://drive.google.com/uc?export=download&id=" + currentID;
                } else {
                    // DoodStream / MyVidPlay download page
                    window.location.href = "https://myvidplay.com/d/" + currentID;
                }
            }, 500); // Small delay to ensure ad opens first
        }

        // Initialize: Load Episode 1 from Drive on page load
        window.onload = function() {
            // Finding the first button to trigger initial play
            let firstBtn = document.querySelector('.btn-ep');
            if (firstBtn) {
                firstBtn.click(); 
            }
        };
    </script>

</body>
</html>
